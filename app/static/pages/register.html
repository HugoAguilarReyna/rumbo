<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Antigravity PM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/dashboard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h3 class="text-center mb-4 navbar-brand" style="font-size: 2rem;">Antigravity PM</h3>
            <h5 class="text-center mb-4 text-secondary">Create Account</h5>

            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="mb-3">
                    <label class="form-label text-secondary">Username</label>
                    <input type="text" id="username" class="form-control" required minlength="3">
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary">Password</label>
                    <input type="password" id="password" class="form-control" required minlength="8">
                    <div class="form-text text-secondary">Min 8 chars, 1 uppercase, 1 number, 1 special</div>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label text-secondary" for="terms">I agree to terms & conditions</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Register</button>

                <div class="text-center text-secondary">
                    Already have an account? <a href="login.html" class="text-primary text-decoration-none">Login</a>
                </div>
            </form>
            <div id="alert-box" class="mt-3"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const alertBox = document.getElementById('alert-box');

            const password = document.getElementById('password').value;
            // Basic client validation
            const regex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!regex.test(password)) {
                alertBox.innerHTML = `<div class="alert alert-warning">Password too weak. Needs Upper, Number, Special char.</div>`;
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Registering...';
            alertBox.innerHTML = '';

            const data = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: password
            };

            try {
                const response = await ApiClient.post('/auth/register', data);

                if (response.ok) {
                    alertBox.innerHTML = `<div class="alert alert-success">Registration successful! Redirecting...</div>`;
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    const err = await response.json();
                    alertBox.innerHTML = `<div class="alert alert-danger">${err.detail}</div>`;
                    btn.disabled = false;
                    btn.textContent = 'Register';
                }
            } catch (error) {
                alertBox.innerHTML = `<div class="alert alert-danger">Network error</div>`;
                btn.disabled = false;
                btn.textContent = 'Register';
            }
        }
    </script>
</body>

</html>
