<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Antigravity PM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/dashboard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h3 class="text-center mb-4 navbar-brand" style="font-size: 2rem;">Antigravity PM</h3>
            <h5 class="text-center mb-4 text-secondary">Welcome Back</h5>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label text-secondary">Username or Email</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div class="d-flex justify-content-between mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label text-secondary" for="remember">Remember me</label>
                    </div>
                    <a href="reset-password.html" class="text-primary text-decoration-none">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                
                <div class="text-center text-secondary">
                    Don't have an account? <a href="register.html" class="text-primary text-decoration-none">Sign up</a>
                </div>
            </form>
            <div id="alert-box" class="mt-3"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const alertBox = document.getElementById('alert-box');
            
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            alertBox.innerHTML = '';
            
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            
            try {
                const response = await ApiClient.post('/auth/login', formData);
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    const err = await response.json();
                    alertBox.innerHTML = `<div class="alert alert-danger">${err.detail}</div>`;
                    btn.disabled = false;
                    btn.textContent = 'Login';
                }
            } catch (error) {
                alertBox.innerHTML = `<div class="alert alert-danger">Network error</div>`;
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }
    </script>
</body>
</html>
