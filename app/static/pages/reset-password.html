<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Antigravity PM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/dashboard.css" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h3 class="text-center mb-4">Reset Password</h3>

            <!-- Request Form -->
            <form id="request-form" onsubmit="handleRequest(event)">
                <div class="mb-3">
                    <label class="form-label text-secondary">Enter your email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
            </form>

            <!-- Reset Form (Hidden initially) -->
            <form id="reset-form" class="d-none" onsubmit="handleReset(event)">
                <div class="mb-3">
                    <label class="form-label text-secondary">New Password</label>
                    <input type="password" id="new-password" class="form-control" required minlength="8">
                </div>
                <button type="submit" class="btn btn-success w-100">Reset Password</button>
            </form>

            <div id="alert-box" class="mt-3"></div>
            <div class="text-center mt-3">
                <a href="login.html" class="text-decoration-none text-secondary">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (token) {
            document.getElementById('request-form').classList.add('d-none');
            document.getElementById('reset-form').classList.remove('d-none');
        }

        async function handleRequest(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const alertBox = document.getElementById('alert-box');

            try {
                const res = await ApiClient.post('/auth/request-password-reset', { email });
                if (res.ok) {
                    alertBox.innerHTML = '<div class="alert alert-info">Check your email for the link</div>';
                }
            } catch (e) {
                alertBox.innerHTML = '<div class="alert alert-danger">Error sending request</div>';
            }
        }

        async function handleReset(e) {
            e.preventDefault();
            const password = document.getElementById('new-password').value;
            const alertBox = document.getElementById('alert-box');

            try {
                const res = await ApiClient.post('/auth/reset-password', { token, new_password: password });
                if (res.ok) {
                    alertBox.innerHTML = '<div class="alert alert-success">Password reset! Redirecting...</div>';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    const err = await res.json();
                    alertBox.innerHTML = `<div class="alert alert-danger">${err.detail}</div>`;
                }
            } catch (e) {
                alertBox.innerHTML = '<div class="alert alert-danger">Error resetting password</div>';
            }
        }
    </script>
</body>

</html>
