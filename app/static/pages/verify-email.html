<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - RUMBO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/dashboard.css" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card text-center">
            <h3 class="mb-4">Email Verification</h3>
            <div id="status">Verifying...</div>
            <a href="login.html" class="btn btn-primary mt-4 d-none" id="login-btn">Go to Login</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const statusDiv = document.getElementById('status');
            const loginBtn = document.getElementById('login-btn');

            if (!token) {
                statusDiv.innerHTML = '<span class="text-danger">Invalid Token</span>';
                return;
            }

            try {
                const response = await ApiClient.post('/auth/verify-email', { token });
                if (response.ok) {
                    statusDiv.innerHTML = '<span class="text-success">Email Verified Successfully!</span>';
                    loginBtn.classList.remove('d-none');
                } else {
                    const err = await response.json();
                    statusDiv.innerHTML = `<span class="text-danger">${err.detail}</span>`;
                }
            } catch (e) {
                statusDiv.innerHTML = '<span class="text-danger">Verification Failed</span>';
            }
        });
    </script>
</body>

</html>
